# Ansible Vault for Proxmox Homelab
# Note: Proxmox API credentials are now automatically managed by installer.sh
# and passed as environment variables/extra-vars to playbooks

# Secrets for the 'proxy' stack
proxy_secrets:
  cloudflare_token: ""

# Secrets for the 'monitoring' stack
monitoring_secrets:
  grafana_admin_user: ""
  grafana_admin_password: ""
  pve_exporter_user: ""
  pve_exporter_password: ""
  pve_exporter_url: ""
  pve_exporter_verify_ssl: false

# Secrets for the 'webtools' stack
webtools_secrets:
  firefox_vnc_password: ""
  homepage_sonarr_api_key: ""
  homepage_radarr_api_key: ""
  homepage_prowlarr_api_key: ""
  homepage_bazarr_api_key: ""
  homepage_jellyfin_api_key: ""
  homepage_jellyseerr_api_key: ""
  homepage_qb_username: ""
  homepage_qb_password: ""
  homepage_grafana_username: ""
  homepage_grafana_password: ""

# Secrets for the 'files' stack (JDownloader, Palmr)
files_secrets:
  jdownloader_vnc_password: ""
  palmr_encryption_key: ""
  palmr_app_url: ""
