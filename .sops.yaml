# SOPS configuration: define how to encrypt files in this repo
# This enables encrypting .env files with age.
---
keys:
  - &default_age age1exampleexampleexampleexampleexampleeeeeeeeee # REPLACE with your actual age public key
creation_rules:
  - paths_regex: 
      - \.env(\..+)?$   # any .env or .env.something file
      - docker/.+/.env$  # per-stack .env files if added later
    key_groups:
      - age:
          - *default_age
    encrypted_regex: '^(?!#).*' # encrypt non-comment lines
    
# Usage (on host):
# 1) Create an age keypair once:
#    age-keygen -o ~/.config/sops/age/keys.txt
#    Extract public key from that file and put here replacing default_age
# 2) Encrypt a file:
#    sops -e -i docker/webtools/.env
# 3) Decrypt for use (read-only to stdout):
#    sops -d docker/webtools/.env > /tmp/.env && ...
# Or during deploy, decrypt and push into the LXC
