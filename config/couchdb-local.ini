[couchdb]
single_node=true

[chttpd]
require_valid_user = true
enable_cors = true
bind_address = 0.0.0.0
port = 5984

[httpd]
WWW-Authenticate = Basic realm="couchdb"
enable_cors = true
bind_address = 0.0.0.0

[cors]
origins = *
credentials = true
headers = accept, authorization, content-type, origin, referer, x-requested-with, CF-Access-Client-Id, CF-Access-Client-Secret
methods = GET, PUT, POST, HEAD, DELETE, OPTIONS
max_age = 3600
