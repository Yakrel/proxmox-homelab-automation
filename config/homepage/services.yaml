
---
# services.yaml
# https://gethomepage.dev/latest/configs/services

- Infrastructure:
    - Proxmox VE:
        description: Virtualization platform
        href: https://proxmox.byetgin.com
        icon: proxmox.png
        widget:
          type: proxmox
          url: "{{HOMEPAGE_VAR_PROXMOX_URL}}"
          username: "{{HOMEPAGE_VAR_PROXMOX_TOKEN_ID}}"
          password: "{{HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET}}"

    - Backrest:
        description: Backup management
        href: https://backrest.byetgin.com
        icon: mdi-backup-restore
        widget:
          type: backrest
          url: http://192.168.1.102:9898
          username: "{{HOMEPAGE_VAR_BACKREST_USERNAME}}"
          password: "{{HOMEPAGE_VAR_BACKREST_PASSWORD}}"
          fields: ["num_success_30", "num_failure_30", "bytes_added_30"]

    - Nginx Proxy Manager:
        description: Reverse proxy management
        href: https://npm.byetgin.com
        icon: nginx-proxy-manager.png
        widget:
          type: npm
          url: http://192.168.1.100:81
          username: "{{HOMEPAGE_VAR_NPM_USERNAME}}"
          password: "{{HOMEPAGE_VAR_NPM_PASSWORD}}"

    - AdGuard Home:
        description: DNS and ad blocking
        href: https://adguard.byetgin.com
        icon: adguard-home.png
        widget:
          type: adguard
          url: http://192.168.1.100:3000
          username: "{{HOMEPAGE_VAR_ADGUARD_USERNAME}}"
          password: "{{HOMEPAGE_VAR_ADGUARD_PASSWORD}}"

    - OmniRoute:
        description: AI gateway and router
        href: https://omniroute.byetgin.com
        icon: mdi-brain
        siteMonitor: http://192.168.1.105:20128

    - Oracle VPS (Cockpit):
        description: Cloud backup node console
        href: https://opc.byetgin.com
        icon: cockpit.png


- Media:
    - Jellyfin:
        description: Media server
        href: https://jellyfin.byetgin.com
        icon: jellyfin.png
        widget:
          type: jellyfin
          url: http://192.168.1.101:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"

    - Immich:
        description: Photo and video library
        href: https://immich.byetgin.com
        icon: immich.png
        widget:
          type: immich
          url: http://192.168.1.101:2283
          key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
          version: 2
    
    - Seerr:
        description: Media requests
        href: https://jellyseerr.byetgin.com
        icon: seerr.png
        widget:
          type: seerr
          url: http://192.168.1.101:5055
          key: "{{HOMEPAGE_VAR_JELLYSEERR_API_KEY}}"
    
    - Sonarr:
        description: TV show management
        href: https://sonarr.byetgin.com
        icon: sonarr.png
        widget:
          type: sonarr
          url: http://192.168.1.101:8989
          key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
    
    - Radarr:
        description: Movie management
        href: https://radarr.byetgin.com
        icon: radarr.png
        widget:
          type: radarr
          url: http://192.168.1.101:7878
          key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
    
    - Prowlarr:
        description: Indexer management
        href: https://prowlarr.byetgin.com
        icon: prowlarr.png
        widget:
          type: prowlarr
          url: http://192.168.1.101:9696
          key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"
    
    - Bazarr:
        description: Subtitle management
        href: https://bazarr.byetgin.com
        icon: bazarr.png
        widget:
          type: bazarr
          url: http://192.168.1.101:6767
          key: "{{HOMEPAGE_VAR_BAZARR_API_KEY}}"
    
    - Tdarr:
        description: Transcoding automation
        href: https://tdarr.byetgin.com
        icon: tdarr.png
        widget:
          type: tdarr
          url: http://192.168.1.101:8265

    - Cleanuparr:
        description: Media cleanup automation
        href: https://cleanuparr.byetgin.com/
        icon: cleanuparr.png
        siteMonitor: http://192.168.1.101:11011

- Utilities:
    - Karakeep:
        description: Bookmark and digital archive
        href: https://karakeep.byetgin.com
        icon: mdi-bookmark
        widget:
          type: karakeep
          url: http://192.168.1.102:3080
          key: "{{HOMEPAGE_VAR_KARAKEEP_API_KEY}}"
          fields: ["bookmarks", "favorites", "tags"]

    - ChangeDetection:
        description: Web page change monitoring
        href: https://changedetection.byetgin.com
        icon: changedetection.png
        widget:
          type: changedetectionio
          url: http://192.168.1.102:5000
          key: "{{HOMEPAGE_VAR_CHANGEDETECTION_API_KEY}}"

    - Desktop Workspace:
        description: Brave browser workspace
        href: https://cdn.byetgin.com
        icon: brave.png
        siteMonitor: https://cdn.byetgin.com

    - Terminal:
        description: Web SSH client
        href: https://terminal.byetgin.com
        icon: sshwifty.png
        siteMonitor: http://192.168.1.103:7681

    - Guacamole:
        description: Remote access gateway
        href: https://remote.byetgin.com
        icon: guacamole.png
        siteMonitor: http://192.168.1.103:8080

    - VS Code:
        description: Web-based development environment
        href: https://code.byetgin.com/
        icon: vscode.png
        siteMonitor: http://192.168.1.106:8680/healthz

    - Vaultwarden:
        description: Password manager
        href: https://vaultwarden.byetgin.com
        icon: vaultwarden.png
        siteMonitor: http://192.168.1.103:8201/alive

    - CouchDB:
        description: Obsidian sync
        href: https://couchdb.byetgin.com/_utils
        icon: couchdb.png
        siteMonitor: http://192.168.1.103:5984/_up

    - Radicale:
        description: CalDAV calendar and task sync
        href: https://radicale.byetgin.com
        icon: radicale.png
        siteMonitor: http://192.168.1.103:5232

    - Repackarr:
        description: Game repack automation
        href: https://repackarr.byetgin.com
        icon: mdi-package-variant
        siteMonitor: http://192.168.1.102:8090/health

- Downloads:
    - qBittorrent:
        description: Torrent client
        href: https://qbittorrent.byetgin.com
        icon: qbittorrent.png
        widget:
          type: qbittorrent
          url: http://192.168.1.101:8080
          username: "{{HOMEPAGE_VAR_QB_USERNAME}}"
          password: "{{HOMEPAGE_VAR_QB_PASSWORD}}"
    
    - MyJDownloader:
        description: Download manager
        href: https://my.jdownloader.org
        icon: jdownloader.png
        widget:
          type: jdownloader
          username: "{{HOMEPAGE_VAR_JDOWNLOADER_USERNAME}}"
          password: "{{HOMEPAGE_VAR_JDOWNLOADER_PASSWORD}}"
          client: "{{HOMEPAGE_VAR_JDOWNLOADER_CLIENT}}"

    - MeTube:
        description: Video downloader
        href: https://metube.byetgin.com
        icon: metube.png
        siteMonitor: http://192.168.1.102:8081

- External:
    - Cloudflare Zero Trust:
        description: Tunnel and network security
        href: https://one.dash.cloudflare.com/9a9852b8b3a0e43cadac66ada7aadeb1/overview?tab=overview&duration=24h
        icon: cloudflare.png
        widget:
          type: cloudflared
          accountid: "{{HOMEPAGE_VAR_CLOUDFLARE_ACCOUNT_ID}}"
          tunnelid: "{{HOMEPAGE_VAR_CLOUDFLARE_TUNNEL_ID}}"
          key: "{{HOMEPAGE_VAR_CLOUDFLARE_API_TOKEN}}"
          fields: ["status", "origin_ip"]

    - Tailscale:
        description: VPN and private network
        href: https://login.tailscale.com/admin/machines
        icon: tailscale.png
