# Homepage Settings Configuration
# This file configures the main settings for your Homepage dashboard

title: "Homelab Dashboard"
theme: dark # or light
color: zinc
language: tr
target: _self

favicon: https://cdn-icons-png.flaticon.com/512/25/25694.png

providers:
  openweathermap: openweathermap
  search: google

# Custom CSS for improved spacing and layout
customCSS: |-
  .widget-label {
    margin-bottom: 8px !important;
  }
  .resource-widget .resource-stat {
    margin-bottom: 8px !important;
    line-height: 1.6 !important;
    padding: 2px 0 !important;
  }
  .resource-value {
    display: inline-block !important;
    margin-right: 10px !important;
  }
  .resource-label {
    display: inline-block !important;
    margin-left: 6px !important;
  }
  .greeting-text, .datetime-text {
    letter-spacing: 0.5px !important;
  }
  .resource-widget div {
    margin-bottom: 4px !important;
  }
  .system-stats .stat-item {
    margin-bottom: 6px !important;
    white-space: nowrap !important;
  }

layout:
  - Media:
      icon: mdi-movie-open
      style: row
      columns: 4
  - Downloads:
      icon: mdi-download
      style: row
      columns: 2
  - Utilities:
      icon: mdi-tools
      style: row
      columns: 2
  - Monitoring:
      icon: mdi-chart-line
      style: row
      columns: 4