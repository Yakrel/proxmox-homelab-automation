# Homepage Settings Configuration
# This file configures the main settings for your Homepage dashboard

title: "Homelab Dashboard"
theme: dark # or light
color: zinc
language: en
target: _self

favicon: https://cdn-icons-png.flaticon.com/512/25/25694.png

providers:
  openweathermap: openweathermap
  search: google


layout:
  - Media:
      icon: mdi-movie-open
      style: row
      columns: 4
  - Downloads:
      icon: mdi-download
      style: row
      columns: 2
  - Utilities:
      icon: mdi-tools
      style: row
      columns: 2
  - Monitoring:
      icon: mdi-chart-line
      style: row
      columns: 4