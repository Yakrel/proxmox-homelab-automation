---
# settings.yaml
# https://gethomepage.dev/latest/configs/settings

title: Proxmox Homelab
favicon: https://www.proxmox.com/favicon.ico

# Theme & Appearance - Minimalist
theme: dark
color: zinc
headerStyle: clean

# Project-local background avoids an external image dependency.
background:
  image: /images/homepage-background.png
  saturate: 60
  brightness: 35
  opacity: 30

# Quick Launch
quicklaunch:
  searchDescriptions: true
  provider: google

# Layout Configuration
layout:
  Infrastructure:
    style: row
    columns: 4
    icon: proxmox.png
  Utilities:
    style: row
    columns: 4
    icon: mdi-tools
  Media:
    style: row
    columns: 4
    icon: jellyfin.png
  Downloads:
    style: row
    columns: 4
    icon: mdi-download
  External:
    style: row
    columns: 4
    icon: mdi-cloud

# Display Options - Minimalist
statusStyle: dot
fullWidth: true
useEqualHeights: false
disableCollapse: true
