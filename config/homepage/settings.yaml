# Homepage Settings Configuration
# This file configures the main settings for your Homepage dashboard

title: "Homelab Dashboard"
theme: dark # or light
color: zinc
language: tr
target: _self

favicon: https://cdn-icons-png.flaticon.com/512/25/25694.png

providers:
  openweathermap: openweathermap
  search: google

# Custom CSS for improved spacing and layout
customCSS: |-
  .widget-label {
    margin-bottom: 8px !important;
  }
  .resource-widget .resource-stat {
    margin-bottom: 6px !important;
    line-height: 1.4 !important;
  }
  .resource-value {
    display: inline-block !important;
    margin-right: 8px !important;
  }
  .resource-label {
    display: inline-block !important;
    margin-left: 4px !important;
  }
  .greeting-text, .datetime-text {
    letter-spacing: 0.5px !important;
  }

layout:
  - Media:
      icon: mdi-movie-open
      style: row
      columns: 4
  - Downloads:
      icon: mdi-download
      style: row
      columns: 2
  - Utilities:
      icon: mdi-tools
      style: row
      columns: 2
  - Monitoring:
      icon: mdi-chart-line
      style: row
      columns: 4