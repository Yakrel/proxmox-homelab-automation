# Homepage Widgets Configuration
# This file defines system information and utility widgets

- search:
    provider: google
    target: _blank

- greeting:
    text_size: xl
    text: "Homelab Control Center"

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: short
      locale: en-US

- openmeteo:
    label: Kırıkkale
    latitude: 39.8468
    longitude: 33.5153
    timezone: Europe/Istanbul
    units: metric
    cache: 5

- resources:
    label: System Status
    cpu: true
    memory: true
    disk: /datapool
    cputemp: true
    uptime: true
    units: metric
    refresh: 3000