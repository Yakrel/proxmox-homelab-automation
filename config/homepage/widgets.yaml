
---
# widgets.yaml
# https://gethomepage.dev/latest/configs/service-widgets

# Greeting
- greeting:
    text_size: xl
    text: "Welcome!"

# System Resources
- resources:
    # CPU and memory are scoped to the Desktop LXC running Homepage.
    label: Desktop LXC
    cpu: true
    memory: true
    uptime: true
    expanded: true
    disk:
      - /datapool
    diskUnits: bytes

# Weather - Kırıkkale
- openmeteo:
    label: Kırıkkale
    latitude: 39.8468
    longitude: 33.5153
    timezone: Europe/Istanbul
    units: metric
    cache: 5

# Date & Time
- datetime:
    text_size: lg
    format:
      dateStyle: short
      timeStyle: short
      hour12: false
