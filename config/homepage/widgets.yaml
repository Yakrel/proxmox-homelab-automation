
---
# widgets.yaml
# https://gethomepage.dev/latest/configs/service-widgets
- resources:
    cpu: true
    disk:
      - /datapool
    diskUnits: bytes
    expanded: true
    label: System
    memory: true
    refresh: 3000
    units: metric
    uptime: true

- search:
    provider: duckduckgo
    target: _blank

- openweathermap:
    cache: 5
    format:
      maximumFractionDigits: 0
    latitude: "{{HOMEPAGE_VAR_WEATHER_LAT}}" # Lütfen .env dosyanızda tanımlayın
    longitude: "{{HOMEPAGE_VAR_WEATHER_LONG}}" # Lütfen .env dosyanızda tanımlayın
    provider: openweathermap
    units: metric
