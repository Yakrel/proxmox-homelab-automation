global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - "/etc/prometheus/rules/*.yml"
  - "/etc/prometheus/recording-rules/*.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # cAdvisor - Per-container metrics from all Docker LXCs
  - job_name: 'cadvisor'
    static_configs:
      - targets:
        - '192.168.1.100:8082'  # gateway
        - '192.168.1.101:8082'  # media
        - '192.168.1.102:8082'  # utility
        - '192.168.1.103:8082'  # desktop
        - '192.168.1.104:8082'  # monitor
        - '192.168.1.105:8082'  # gaming
        # Note: LXC 106 (dev) excluded - no Docker
    relabel_configs:
      - source_labels: [__address__]
        regex: '192.168.1.100:8082'
        target_label: instance
        replacement: 'lxc-gateway'
      - source_labels: [__address__]
        regex: '192.168.1.101:8082'
        target_label: instance
        replacement: 'lxc-media'
      - source_labels: [__address__]
        regex: '192.168.1.102:8082'
        target_label: instance
        replacement: 'lxc-utility'
      - source_labels: [__address__]
        regex: '192.168.1.103:8082'
        target_label: instance
        replacement: 'lxc-desktop'
      - source_labels: [__address__]
        regex: '192.168.1.104:8082'
        target_label: instance
        replacement: 'lxc-monitor'
      - source_labels: [__address__]
        regex: '192.168.1.105:8082'
        target_label: instance
        replacement: 'lxc-gaming'

  

  # Proxmox VE Exporter
  - job_name: 'proxmox'
    static_configs:
      - targets:
        - '192.168.1.10' # Your Proxmox IP
    metrics_path: /pve
    params:
      module: [default]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: prometheus-pve-exporter:9221 # The exporter's address

  # Loki for log aggregation
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Promtail - Log shipping health from each Docker LXC
  - job_name: 'promtail'
    static_configs:
      - targets:
        - '192.168.1.100:9080'  # gateway
        - '192.168.1.101:9080'  # media
        - '192.168.1.102:9080'  # utility
        - '192.168.1.103:9080'  # desktop
        - '192.168.1.104:9080'  # monitor
        - '192.168.1.105:9080'  # gaming
        # Note: LXC 106 (dev) excluded - no Docker
    relabel_configs:
      - source_labels: [__address__]
        regex: '192.168.1.100:9080'
        target_label: instance
        replacement: 'lxc-gateway'
      - source_labels: [__address__]
        regex: '192.168.1.101:9080'
        target_label: instance
        replacement: 'lxc-media'
      - source_labels: [__address__]
        regex: '192.168.1.102:9080'
        target_label: instance
        replacement: 'lxc-utility'
      - source_labels: [__address__]
        regex: '192.168.1.103:9080'
        target_label: instance
        replacement: 'lxc-desktop'
      - source_labels: [__address__]
        regex: '192.168.1.104:9080'
        target_label: instance
        replacement: 'lxc-monitor'
      - source_labels: [__address__]
        regex: '192.168.1.105:9080'
        target_label: instance
        replacement: 'lxc-gaming'
