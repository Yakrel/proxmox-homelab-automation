name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'docs/**'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages and manage deployments
permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying; no build step needed for static files
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the docs directory
          path: 'docs'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Clean up old deployments
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deployments=$(gh api repos/$GITHUB_REPOSITORY/deployments?environment=github-pages -q '.[] | .id')
          count=$(echo "$deployments" | grep -c . || true)
          if [ "$count" -gt 5 ]; then
            to_delete=$(echo "$deployments" | tail -n +6)
            for id in $to_delete; do
              echo "Cleaning up old deployment: $id"
              gh api -X POST repos/$GITHUB_REPOSITORY/deployments/$id/statuses -f state=inactive || true
              gh api -X DELETE repos/$GITHUB_REPOSITORY/deployments/$id || true
            done
          fi
