# Central source of truth for LXC stacks (IDs, hostnames, resources)
# All scripts read from this file to maintain consistency and follow DRY principle.
# Network: Fixed homelab topology - Proxmox 192.168.1.10, LXCs 192.168.1.{ct_id}
# Storage: fastpool (SSD, configs/databases) and datapool (HDD, media/backups/templates)

storage:
  pool: fastpool
  template_pool: datapool

nvidia:
  driver_version: "580.173.02"

stacks:
  gateway:
    ct_id: 100
    hostname: lxc-gateway
    cpu_cores: 2
    memory_mb: 2048
    disk_gb: 8
  media:
    ct_id: 101
    hostname: lxc-media
    cpu_cores: 6
    memory_mb: 10240
    disk_gb: 40
  utility:
    ct_id: 102
    hostname: lxc-utility
    cpu_cores: 4
    memory_mb: 4096
    disk_gb: 15
  desktop:
    ct_id: 103
    hostname: lxc-desktop
    cpu_cores: 4
    memory_mb: 6144
    disk_gb: 30
  ai:
    ct_id: 105
    hostname: lxc-ai
    cpu_cores: 4
    memory_mb: 4096
    disk_gb: 8
  dev:
    ct_id: 106
    hostname: lxc-dev
    cpu_cores: 4
    memory_mb: 6144
    disk_gb: 15
