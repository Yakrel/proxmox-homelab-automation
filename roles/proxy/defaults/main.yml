---
# Default values for proxy role
# These override defaults from lxc_common and docker_common roles

# Stack identification
stack_name: proxy

# Load stack-specific variables from central configuration
_stacks_config: "{{ lookup('file', playbook_dir ~ '/stacks.yaml') | from_yaml }}"
_stack_data: "{{ _stacks_config.stacks.proxy }}"

# LXC Configuration from stacks.yaml
ct_id: "{{ _stack_data.ct_id }}"
hostname: "{{ _stack_data.hostname }}"
ip_octet: "{{ _stack_data.ip_octet }}"
cpu_cores: "{{ _stack_data.cpu_cores }}"
memory_mb: "{{ _stack_data.memory_mb }}"
disk_gb: "{{ _stack_data.disk_gb }}"
lxc_template_type: "{{ _stack_data.template }}"
lxc_mount_datapool: "{{ _stack_data.mount_datapool }}"
lxc_onboot: "{{ _stack_data.onboot }}"

# Service-specific settings
proxy_services:
  - cloudflared
  - promtail
  - watchtower
