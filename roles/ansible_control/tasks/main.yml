---
# Ansible_control role - Simplified using common roles

- name: Check if generated API credentials exist
  ansible.builtin.stat:
    path: /etc/ansible_secrets/credentials.yml
  register: creds_file

- name: Include generated API credentials if they exist
  ansible.builtin.include_vars: /etc/ansible_secrets/credentials.yml
  when: creds_file.stat.exists


# The lxc_common role dependency will handle:
# - LXC creation and configuration
# - Docker installation
# - Security setup
# This is defined in meta/main.yml dependencies

- name: Deploy Docker Compose stack using common role
  ansible.builtin.include_role:
    name: docker_common
