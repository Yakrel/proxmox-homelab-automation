---
# tasks file for the development role

- name: Include stack-specific variables
  include_vars: "vars/main.yml"

- name: Include generated API credentials if they exist
  include_vars: /etc/ansible_secrets/credentials.yml
  ignore_errors: true

- name: Find latest Debian Linux template on the Proxmox host
  shell: "pveam list {{ storage_pool }} | awk '/debian-.*-standard/ {print $1}' | sort -V | tail -n 1"
  register: latest_debian_template_result
  changed_when: false
  delegate_to: localhost

- name: Set template fact
  set_fact:
    lxc_template: "{{ latest_debian_template_result.stdout }}"

- name: Fail if no template was found
  fail:
    msg: "Could not find any Debian Linux template in storage pool '{{ storage_pool }}'."
  when: lxc_template is not defined or lxc_template | length == 0

- name: Create or Update Development LXC Container on Proxmox host
  community.general.proxmox_lxc:
    node: "{{ proxmox_node }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    vmid: "{{ ct_id }}"
    hostname: "{{ hostname }}"
    state: started
    storage: "{{ storage_pool }}"
    cores: "{{ cpu_cores }}"
    memory: "{{ memory_mb }}"
    swap: 0
    features:
      - keyctl=1
      - nesting=1
    netif:
      net0: "name=eth0,bridge={{ network_bridge }},ip={{ network_ip_base }}.{{ ip_octet }}/24,gw={{ network_gateway }}"
    onboot: true
    unprivileged: true
    ostemplate: "{{ lxc_template }}"
    rootfs: "{{ storage_pool }}:{{ disk_gb }}"
  delegate_to: localhost

- name: Add new LXC to Ansible's in-memory inventory
  add_host:
    name: "{{ hostname }}"
    ansible_connection: lxc
    ansible_user: root
  changed_when: false

- name: Wait until the container is ready for package management
  command: "apt-get update"
  delegate_to: "{{ hostname }}"
  changed_when: false
  retries: 10
  delay: 5
  until: result.rc == 0
  register: result

- name: Install Git and Ansible inside the LXC
  apt:
    name:
      - git
      - ansible
    update_cache: true
    state: present
  delegate_to: "{{ hostname }}"

- name: Clone or update repository inside the LXC
  ansible.builtin.git:
    repo: "{{ repo_url | default('https://github.com/Yakrel/proxmox-homelab-automation.git') }}"
    dest: "{{ repo_dir | default('/root/proxmox-homelab-automation') }}"
    version: main
    update: yes
    accept_hostkey: yes
  delegate_to: "{{ hostname }}"
