---
# LXC Security Setup Tasks
# Common security configuration for all LXC containers

- name: Configure autologin for root user in LXC console
  ansible.builtin.file:
    path: /etc/systemd/system/getty@tty1.service.d
    state: directory
    mode: '0755'
  delegate_to: "{{ hostname }}"

- name: Setup autologin configuration for root user
  ansible.builtin.copy:
    content: |
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty --autologin root --noclear %I $TERM
    dest: /etc/systemd/system/getty@tty1.service.d/override.conf
    mode: '0644'
  delegate_to: "{{ hostname }}"
  notify:
    - Reload systemd daemon in LXC
    - Enable getty service in LXC
    - Restart getty service in LXC

- name: Ensure openssh-server is not installed in LXC containers
  ansible.builtin.package:
    name: "{{ ssh_packages }}"
    state: absent
  delegate_to: "{{ hostname }}"
  vars:
    ssh_packages: >-
      {{ lxc_ssh_packages_alpine if lxc_template_type == 'alpine'
         else lxc_ssh_packages_debian }}
  failed_when: false  # In case packages are not installed

- name: Disable SSH service if it exists
  ansible.builtin.service:
    name: "{{ ssh_service }}"
    state: stopped
    enabled: false
  delegate_to: "{{ hostname }}"
  vars:
    ssh_service: >-
      {{ lxc_ssh_service_alpine if lxc_template_type == 'alpine'
         else lxc_ssh_service_debian }}
  failed_when: false  # In case service doesn't exist
