---
# tasks file for the media role (using ansible_connection: lxc)

- name: Include stack-specific variables
  ansible.builtin.include_vars: "vars/main.yml"

- name: Check if generated API credentials exist
  ansible.builtin.stat:
    path: /etc/ansible_secrets/credentials.yml
  register: creds_file

- name: Include generated API credentials if they exist
  ansible.builtin.include_vars: /etc/ansible_secrets/credentials.yml
  when: creds_file.stat.exists

- name: Download latest template if needed (Alpine/Debian to datapool)
  ansible.builtin.shell: >
    set -o pipefail &&
    TEMPLATE_PATTERN="{{ alpine_template_pattern if template_type == 'alpine' else debian_template_pattern }}" &&
    LATEST_AVAILABLE=$(pveam available | awk "/$TEMPLATE_PATTERN/ {print \$NF}" | sort -V | tail -n 1) &&
    if [ -n "$LATEST_AVAILABLE" ]; then
      LATEST_LOCAL=$(pveam list {{ storage_pool }} | awk "/$TEMPLATE_PATTERN/ {print \$1}" | sort -V | tail -n 1) &&
      if [ -z "$LATEST_LOCAL" ]; then
        echo "Downloading $LATEST_AVAILABLE to {{ storage_pool }}" &&
        pveam download {{ storage_pool }} "$LATEST_AVAILABLE"
      fi
    fi
  args:
    executable: /bin/bash
  register: template_download_result
  changed_when: "'Downloading' in template_download_result.stdout"
  delegate_to: localhost

- name: Find latest template in datapool storage
  ansible.builtin.shell: >
    set -o pipefail && 
    pveam list {{ storage_pool }} | 
    awk '/{{ alpine_template_pattern if template_type == "alpine" else debian_template_pattern }}/ {print $1}' | 
    sort -V | tail -n 1
  args:
    executable: /bin/bash
  register: latest_template_result
  changed_when: false
  delegate_to: localhost

- name: Set template fact
  ansible.builtin.set_fact:
    lxc_template: "{{ latest_template_result.stdout }}"

- name: Fail if no template was found
  ansible.builtin.fail:
    msg: "Could not find any {{ template_type }} template in storage pool '{{ storage_pool }}'."
  when: lxc_template is not defined or lxc_template | length == 0

- name: Create or Update Media LXC Container on Proxmox host
  community.proxmox.proxmox:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ ct_id }}"
    hostname: "{{ hostname }}"
    state: started
    cores: "{{ cpu_cores }}"
    memory: "{{ memory_mb }}"
    disk: "{{ storage_pool }}:{{ disk_gb }}"
    ostemplate: "{{ lxc_template }}"
    netif:
      net0:
        name: eth0
        bridge: "{{ network_bridge }}"
        ip: "{{ network_ip_base }}.{{ ip_octet }}/24"
        gw: "{{ network_gateway }}"
    mounts:
      mp0: "{{ storage_pool }}:0,mp={{ datapool_mount }},backup=0"
    onboot: "{{ onboot | default(true) }}"
    unprivileged: true
    features:
      - keyctl=1
      - nesting=1
  delegate_to: localhost
  register: lxc_creation_result

- name: Add new LXC to Ansible's in-memory inventory
  ansible.builtin.add_host:
    name: "{{ hostname }}"
    ansible_connection: lxc
    ansible_user: root
  changed_when: false

# From this point on, we delegate tasks to the container itself.
# Ansible will use the 'lxc' connection plugin automatically.

- name: Wait until the container is ready for package management
  ansible.builtin.command: "{{ 'apk update' if template_type == 'alpine' else 'apt-get update' }}"
  delegate_to: "{{ hostname }}"
  changed_when: false
  retries: 10
  delay: 5
  register: result
  until: result.rc == 0

- name: Install Docker and Docker Compose Plugin inside the LXC
  ansible.builtin.package:
    name: "{{ docker_packages }}"
    state: present
  delegate_to: "{{ hostname }}"
  vars:
    docker_packages: >-
      {{ ['docker', 'docker-cli-compose'] if template_type == 'alpine' 
         else ['docker.io', 'docker-compose-plugin'] }}

- name: Ensure Docker service is started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  delegate_to: "{{ hostname }}"

- name: Copy Docker Compose file to the new LXC
  ansible.builtin.copy:
    src: "{{ role_path }}/../../docker/{{ stack_name }}/docker-compose.yml"
    dest: "/root/docker-compose.yml"
    mode: '0644'
  delegate_to: "{{ hostname }}"

- name: Deploy Docker Compose stack
  community.docker.docker_compose_v2:
    project_src: "/root/"
    state: present
  delegate_to: "{{ hostname }}"
