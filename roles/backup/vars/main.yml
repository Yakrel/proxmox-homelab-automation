---
# Variables for the backup role - loaded from stacks.yaml central config

# Load central configuration
stacks_config: "{{ lookup('file', playbook_dir ~ '/stacks.yaml') | from_yaml }}"
stack_data: "{{ stacks_config.stacks.backup }}"

# Stack-specific variables from central config
stack_name: backup
ct_id: "{{ stack_data.ct_id }}"
hostname: "{{ stack_data.hostname }}"
ip_octet: "{{ stack_data.ip_octet }}"
cpu_cores: "{{ stack_data.cpu_cores }}"
memory_mb: "{{ stack_data.memory_mb }}"
disk_gb: "{{ stack_data.disk_gb }}"
template_type: "{{ stack_data.template }}"
mount_datapool: "{{ stack_data.mount_datapool }}"
onboot: "{{ stack_data.onboot }}"

# PBS specific configuration from central config
pbs_datastore_name: "{{ stack_data.pbs_datastore_name }}"
pbs_repo_suite: "{{ stack_data.pbs_repo_suite }}"
pbs_prune_schedule: "{{ stack_data.pbs_prune_schedule }}"
pbs_gc_schedule: "{{ stack_data.pbs_gc_schedule }}"
pbs_verify_schedule: "{{ stack_data.pbs_verify_schedule }}"

# Additional PBS hardcoded settings (homelab optimized)
pbs_datastore_path: "/datapool/backups"
pbs_keep_daily: 7      # Keep daily backups for 7 days
pbs_keep_weekly: 4     # Keep weekly backups for 4 weeks
pbs_keep_monthly: 6    # Keep monthly backups for 6 months
pbs_keep_yearly: 1     # Keep yearly backups for 1 year
pbs_backup_user: "proxmox-backup@pbs"
pbs_backup_user_comment: "Proxmox VE backup user"

# Proxmox VE Backup Job Configuration
pve_backup_job_id: "pbs-homelab-backup"
pve_backup_schedule: "02:30"  # Start backups at 2:30 AM daily
pve_backup_storage: "pbs-backup"  # Storage name in Proxmox VE
pve_backup_mode: "snapshot"  # Use snapshot mode for minimal downtime
pve_backup_compress: "zstd"   # Use zstd compression
pve_backup_notes_template: "{{ guestname }} backup created on {{ cluster }} at {{ isotime }}"
