name: media

networks:
  media-net:
    driver: bridge


services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=${TZ:-Europe/Istanbul}
    volumes:
      - /datapool/config/sonarr:/config
      - /datapool:/datapool
    ports:
      - "8989:8989"
    networks:
      - media-net
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=${TZ:-Europe/Istanbul}
    volumes:
      - /datapool/config/radarr:/config
      - /datapool:/datapool
    ports:
      - "7878:7878"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - media-net
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=${TZ:-Europe/Istanbul}
    volumes:
      - /datapool/config/bazarr:/config
      - /datapool:/datapool
    ports:
      - "6767:6767"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - media-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    mem_limit: 6g
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=${TZ:-Europe/Istanbul}
      # NVIDIA GPU environment variables for hardware acceleration
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /datapool/config/jellyfin:/config
      - /datapool:/datapool
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [compute,video,graphics,utility]
    ports:
      - "8096:8096"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - media-net
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: jellyseerr
    init: true
    depends_on:
      - jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=${TZ:-Europe/Istanbul}
    volumes:
      - /datapool/config/jellyseerr:/app/config
    dns:
      - 8.8.8.8
    ports:
      - "5055:5055"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:5055/api/v1/status', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - media-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=${TZ:-Europe/Istanbul}
      - WEBUI_PORT=8080
    volumes:
      - /datapool/config/qbittorrent:/config
      - /datapool:/datapool
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - media-net
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=${TZ:-Europe/Istanbul}
    volumes:
      - /datapool/config/prowlarr:/config
    ports:
      - "9696:9696"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - media-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  tor-proxy:
    image: peterdavehello/tor-socks-proxy:latest
    container_name: tor-proxy
    restart: unless-stopped
    healthcheck:
      disable: true
    networks:
      - media-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=flaresolverr
      - TZ=${TZ:-Europe/Istanbul}
      - PUID=1000
      - PGID=1000
      - UMASK=002
      # Route FlareSolverr traffic through Tor Proxy to bypass ISP blocks
      - PROXY=socks5://tor-proxy:9150
    ports:
      - "8191:8191"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - media-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  recyclarr:
    image: recyclarr/recyclarr:latest
    container_name: recyclarr
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=${TZ:-Europe/Istanbul}
    volumes:
      - /datapool/config/recyclarr:/config
    networks:
      - media-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  # Immich services - version pinning required for component compatibility
  # Immich recommends using version-pinned images and updating docker-compose with each release
  # Reference: https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
  immich-server:
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    user: "1000:1000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
                - compute
                - video
    env_file:
      - .env
    ports:
      - "2283:2283"
    depends_on:
      - redis
      - database
    healthcheck:
      disable: false
    networks:
      - media-net
    restart: always
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  immich-machine-learning:
    container_name: immich-machine-learning
    mem_limit: 6g
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-cuda
    user: "1000:1000"
    volumes:
      - /datapool/config/immich/cache:/cache
    env_file:
      - .env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HOME=/tmp
      - MPLCONFIGDIR=/tmp/matplotlib
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    healthcheck:
      disable: false
    networks:
      - media-net
    restart: always
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  redis:
    container_name: immich-redis
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    healthcheck:
      test: redis-cli ping || exit 1
    networks:
      - media-net
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  database:
    container_name: immich-database
    mem_limit: 2g
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    user: "1000:1000"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    healthcheck:
      disable: false
    networks:
      - media-net
    shm_size: 128mb
    restart: always
    stop_grace_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  tdarr:
    container_name: tdarr
    mem_limit: 6g
    image: ghcr.io/haveagitgat/tdarr:latest
    restart: unless-stopped
    stop_grace_period: 1m
    networks:
      - media-net
    ports:
      - 8265:8265 # webUI
      - 8266:8266 # server
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/Istanbul}
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - inContainer=true
      - nodeName=MainNode
      # NVIDIA GPU environment variables
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /datapool/config/tdarr/server:/app/server
      - /datapool/config/tdarr/configs:/app/configs
      - /datapool/config/tdarr/logs:/app/logs
      - /datapool/media:/media
      - /datapool/temp/tdarr:/temp
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [compute,video,graphics,utility]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  cleanuperr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuperr
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=${TZ:-Europe/Istanbul}
      - PORT=11011
      - BASE_PATH=
    volumes:
      - /datapool/config/cleanuperr:/config
      - /datapool:/datapool
    ports:
      - "11011:11011"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11011"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - media-net
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr
      - qbittorrent
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - WATCHTOWER_CLEANUP=true
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - WATCHTOWER_SCHEDULE=0 12 */6 * * *
      - WATCHTOWER_NOTIFICATION_URL=telegram://${WATCHTOWER_TELEGRAM_TOKEN:-}@telegram?chats=${WATCHTOWER_TELEGRAM_CHAT_IDS:-}
      - WATCHTOWER_NOTIFICATIONS_LEVEL=info
      - WATCHTOWER_NOTIFICATION_TITLE_TAG=lxc-media
    networks:
      - media-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"