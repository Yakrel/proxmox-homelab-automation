name: utility

networks:
  utility-net:
    driver: bridge

volumes:
  samba-cache:
  samba-lib:

services:
  jdownloader2:
    image: antlafarge/jdownloader:latest
    container_name: jdownloader2
    user: "1000:1000"
    environment:
      - JD_EMAIL=${MYJD_USER:?MyJDownloader email must be defined}
      - JD_PASSWORD=${MYJD_PASSWORD:?MyJDownloader password must be defined}
      - JD_DEVICENAME=${MYJD_DEVICE_NAME:-homelab-jdownloader}
    volumes:
      - /datapool/config/jdownloader2:/jdownloader/cfg
      - /datapool/torrents/other:/jdownloader/downloads
    ports:
      - "3129:3129"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f JDownloader || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - utility-net
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  samba:
    image: crazymax/samba:latest
    container_name: samba
    network_mode: host
    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - SAMBA_USER=${SAMBA_USER:?Samba username must be defined}
      - SAMBA_PASSWORD=${SAMBA_PASSWORD:?Samba password must be defined}
    volumes:
      - /datapool/config/samba:/data
      - /datapool:/datapool
      - samba-cache:/data/cache
      - samba-lib:/data/lib
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  repackarr:
    image: ghcr.io/yakrel/repackarr:latest
    container_name: repackarr
    restart: unless-stopped
    ports:
      - "8090:3000"
    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - QBIT_HOST=${REPACKARR_QBIT_HOST}
      - QBIT_USERNAME=${REPACKARR_QBIT_USERNAME}
      - QBIT_PASSWORD=${REPACKARR_QBIT_PASSWORD}
      - QBIT_CATEGORY=${REPACKARR_QBIT_CATEGORY}
      - PROWLARR_URL=${REPACKARR_PROWLARR_URL}
      - PROWLARR_API_KEY=${REPACKARR_PROWLARR_API_KEY}
      - CRON_INTERVAL_MINUTES=${REPACKARR_CRON_INTERVAL_MINUTES}
      - PLATFORM_FILTER=${REPACKARR_PLATFORM_FILTER}
      - IGNORED_KEYWORDS=${REPACKARR_IGNORED_KEYWORDS}
      - ALLOWED_INDEXERS=${REPACKARR_ALLOWED_INDEXERS}
      - IGDB_CLIENT_ID=${REPACKARR_IGDB_CLIENT_ID}
      - IGDB_CLIENT_SECRET=${REPACKARR_IGDB_CLIENT_SECRET}
    volumes:
      - /datapool/config/repackarr/data:/app/data
      - /datapool/config/repackarr/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - utility-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  backrest:
    image: ghcr.io/yakrel/docker-backrest-rclone:latest
    container_name: backrest
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "9898:9898"
    volumes:
      - /datapool/config/backrest/config:/config
      - /datapool/config/backrest/data:/data
      - /datapool/config/backrest/cache:/cache
      - /datapool/backup:/repos
      - /datapool/config:/backup-sources/config:rw
      - /datapool/media/immich:/backup-sources/immich:rw
    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - PUID=1000
      - PGID=1000
      - BACKREST_CONFIG=/config/config.json
      - BACKREST_DATA=/data
      - BACKREST_PORT=9898
      - XDG_CACHE_HOME=/cache
    user: "1000:1000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9898/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - utility-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=${TZ:-Europe/Istanbul}
    volumes:
      - /datapool/config/metube:/config
      - /datapool/media/kids/youtube:/downloads
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - utility-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - WATCHTOWER_CLEANUP=true
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - WATCHTOWER_SCHEDULE=0 24 */6 * * *
      - WATCHTOWER_NOTIFICATION_URL=telegram://${WATCHTOWER_TELEGRAM_TOKEN:-}@telegram?chats=${WATCHTOWER_TELEGRAM_CHAT_IDS:-}
      - WATCHTOWER_NOTIFICATIONS_LEVEL=info
      - WATCHTOWER_NOTIFICATION_TITLE_TAG=lxc-utility
    networks:
      - utility-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  changedetection:
    image: ghcr.io/dgtlmoon/changedetection.io:latest
    container_name: changedetection
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "5000:5000"
    volumes:
      - /datapool/config/changedetection:/datastore
    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - PLAYWRIGHT_DRIVER_URL=ws://playwright-chrome:3000/?stealth=1&--disable-web-security=true
    depends_on:
      - playwright-chrome
    networks:
      - utility-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  playwright-chrome:
    image: dgtlmoon/sockpuppetbrowser:latest
    container_name: playwright-chrome
    restart: unless-stopped
    shm_size: '2gb'
    dns:
      - 94.140.14.14
      - 94.140.15.15
    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1080
      - SCREEN_DEPTH=24
      - ENABLE_DEBUGGER=false
      - PREBOOT_CHROME=true
      - MAX_CONCURRENT_SESSIONS=10
    networks:
      - utility-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  karakeep:
    image: ghcr.io/karakeep-app/karakeep:latest
    container_name: karakeep
    restart: unless-stopped
    ports:
      - "3080:3000"
    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - MEILI_ADDR=http://karakeep-meili:7700
      - MEILI_MASTER_KEY=${KARAKEEP_MEILI_MASTER_KEY:?Karakeep Meili master key is required}
      - BROWSER_WEB_URL=http://karakeep-chrome:9222
      - DATA_DIR=/data
      - NEXTAUTH_SECRET=${KARAKEEP_NEXTAUTH_SECRET:?Karakeep NextAuth secret is required}
      - NEXTAUTH_URL=${KARAKEEP_NEXTAUTH_URL:?Karakeep NextAuth URL is required}
      - OPENAI_API_KEY=${KARAKEEP_OPENAI_API_KEY}
      - OPENAI_BASE_URL=${KARAKEEP_OPENAI_BASE_URL}
      - INFERENCE_TEXT_MODEL=${KARAKEEP_INFERENCE_TEXT_MODEL:-gemini-3.5-flash}
      - INFERENCE_IMAGE_MODEL=${KARAKEEP_INFERENCE_IMAGE_MODEL:-gemini-3.5-flash}
    volumes:
      - /datapool/config/karakeep/data:/data
    depends_on:
      - karakeep-meili
      - karakeep-chrome
    networks:
      - utility-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  karakeep-chrome:
    image: gcr.io/zenika-hub/alpine-chrome:latest
    container_name: karakeep-chrome
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    networks:
      - utility-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  karakeep-meili:
    image: getmeili/meilisearch:latest
    container_name: karakeep-meili
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${KARAKEEP_MEILI_MASTER_KEY:?Karakeep Meili master key is required}
    volumes:
      - /datapool/config/karakeep/meilisearch:/meili_data
    networks:
      - utility-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"
