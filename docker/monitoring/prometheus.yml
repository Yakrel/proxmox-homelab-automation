global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Docker Engine daemon metrics (each LXC exposes 9323)
  - job_name: 'docker_engine'
    static_configs:
      - targets:
        - '192.168.1.100:9323'
        - '192.168.1.101:9323'
        - '192.168.1.102:9323'
        - '192.168.1.103:9323'
        - '192.168.1.104:9323'
        - '192.168.1.150:9323'
    relabel_configs:
      - source_labels: [__address__]
        regex: '192.168.1.100:9323'
        target_label: instance
        replacement: 'proxy-lxc-100'
      - source_labels: [__address__]
        regex: '192.168.1.101:9323'
        target_label: instance
        replacement: 'media-lxc-101'
      - source_labels: [__address__]
        regex: '192.168.1.102:9323'
        target_label: instance
        replacement: 'files-lxc-102'
      - source_labels: [__address__]
        regex: '192.168.1.103:9323'
        target_label: instance
        replacement: 'webtools-lxc-103'
      - source_labels: [__address__]
        regex: '192.168.1.104:9323'
        target_label: instance
        replacement: 'monitoring-lxc-104'
      - source_labels: [__address__]
        regex: '192.168.1.150:9323'
        target_label: instance
        replacement: 'development-lxc-150'

  

  # Proxmox VE Exporter
  - job_name: 'proxmox'
    static_configs:
      - targets:
        - '192.168.1.10' # Your Proxmox IP
    metrics_path: /pve
    params:
      module: [default]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: prometheus-pve-exporter:9221 # The exporter's address

  # Loki for log aggregation
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Promtail for log shipping
  - job_name: 'promtail'
    static_configs:
      - targets: ['promtail-monitoring:9080']