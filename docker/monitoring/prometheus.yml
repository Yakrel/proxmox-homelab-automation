global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - Monitoring LXC (104)
  - job_name: 'node-exporter-monitoring'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'monitoring-lxc-104'

  # Node Exporter - Proxy LXC (100)
  - job_name: 'node-exporter-proxy'
    static_configs:
      - targets: ['10.0.0.100:9100']  # Adjust IP as needed
        labels:
          instance: 'proxy-lxc-100'

  # Node Exporter - Media LXC (101)
  - job_name: 'node-exporter-media'
    static_configs:
      - targets: ['10.0.0.101:9101']  # Adjust IP as needed
        labels:
          instance: 'media-lxc-101'

  # Node Exporter - Downloads LXC (102)
  - job_name: 'node-exporter-downloads'
    static_configs:
      - targets: ['10.0.0.102:9102']  # Adjust IP as needed
        labels:
          instance: 'downloads-lxc-102'

  # Node Exporter - Utility LXC (103)
  - job_name: 'node-exporter-utility'
    static_configs:
      - targets: ['10.0.0.103:9103']  # Adjust IP as needed
        labels:
          instance: 'utility-lxc-103'

  # cAdvisor - Container metrics from Monitoring LXC
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Proxmox VE Exporter
  - job_name: 'proxmox'
    static_configs:
      - targets: ['prometheus-pve-exporter:9221']
    metrics_path: /pve
    params:
      cluster: ['1']
      node: ['1']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: prometheus-pve-exporter:9221