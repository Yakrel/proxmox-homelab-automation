# IMPORTANT NOTE ON PUID/PGID:
# The setup_proxy_lxc.sh script sets host directory ownership to 100000:100000 (mapped from LXC ID 100).
# The PUID/PGID=100000 configuration below is confirmed to work correctly in this setup 
# and aligns with the host directory permissions.

networks:
  proxy-net:
    driver: bridge

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN:?Cloudflare tunnel token must be defined}
      - PUID=100000
      - PGID=100000
      - TZ=Europe/Istanbul
    volumes:
      - /datapool/config/cloudflared:/etc/cloudflared:ro
    networks:
      - proxy-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cap_add:
      - NET_RAW
      - SYS_RESOURCE

  adguard:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
      - "443:443/tcp"
      - "3000:3000/tcp"
    volumes:
      - /datapool/config/adguard/work:/opt/adguardhome/work
      - /datapool/config/adguard/conf:/opt/adguardhome/conf
    environment:
      - TZ=Europe/Istanbul
      - PUID=100000
      - PGID=100000
      - UMASK=002
    networks:
      - proxy-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /datapool/config/watchtower-proxy:/config:ro
    environment:
      - TZ=Europe/Istanbul
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 2 * * *
      - PUID=100000
      - PGID=100000
      - UMASK=002
    restart: unless-stopped
    networks:
      - proxy-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        
  firefox:
    image: jlesage/firefox:latest
    container_name: firefox
    restart: unless-stopped
    ports:
      - "5800:5800"
      - "5900:5900"
    volumes:
      - /datapool/config/firefox:/config:rw
    environment:
      - TZ=Europe/Istanbul
      - VNC_PASSWORD=${FIREFOX_VNC_PASSWORD:?Firefox VNC password must be defined}
      - PUID=100000
      - PGID=100000
      - KEEP_APP_RUNNING=1
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
    networks:
      - proxy-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
