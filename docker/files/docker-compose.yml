include:
  - ../common/compose.yml

networks:
  files-net:
    driver: bridge

services:
  jdownloader2:
    image: jlesage/jdownloader-2:latest
    container_name: jdownloader2
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=Europe/Istanbul
      - KEEP_APP_RUNNING=1
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=768
      - VNC_PASSWORD=${JDOWNLOADER_VNC_PASSWORD:?JDownloader VNC password must be defined}
    volumes:
      - /datapool/config/jdownloader2:/config
      - /datapool/torrents/other:/output
    ports:
      - "5800:5800"
    networks:
      - files-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=Europe/Istanbul
    volumes:
      - /datapool/config/metube:/config
      - /datapool/media/youtube:/downloads
    ports:
      - "8081:8081"
    networks:
      - files-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  palmr:
    image: kyantech/palmr:latest
    container_name: palmr
    environment:
      - PALMR_UID=1000
      - PALMR_GID=1000
      - UMASK=002
      - TZ=Europe/Istanbul
      - ENABLE_S3=false
      - ENCRYPTION_KEY=${PALMR_ENCRYPTION_KEY:?Palmr encryption key must be defined (min 32 chars)}
      - APP_URL=${PALMR_APP_URL:?Palmr App URL must be defined}
    volumes:
      - /datapool/config/palmr:/app/server
      - /datapool/config/palmr/uploads:/app/uploads
    ports:
      - "5487:5487"
      - "3333:3333"
    networks:
      - files-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    extends:
      service: cadvisor
    container_name: cadvisor-files
    networks:
      - files-net

  promtail:
    extends:
      service: promtail
    container_name: promtail-files
    networks:
      - files-net

  watchtower:
    extends:
      service: watchtower
    container_name: watchtower-files
    command: ["--schedule", "0 0 8,14,20,2 * * *"]
    networks:
      - files-net