name: ai

networks:
  ai-net:
    driver: bridge

services:
  agentmemory:
    build:
      context: ./agentmemory
      dockerfile: Dockerfile
      args:
        AGENTMEMORY_VERSION: "latest"
    container_name: agentmemory
    restart: unless-stopped
    depends_on:
      omniroute:
        condition: service_started
    ports:
      - "192.168.1.105:3111:3111"
      - "192.168.1.105:3113:3113"
    volumes:
      - /fastpool/config/agentmemory:/data
    environment:
      - OPENAI_API_KEY=${AGENTMEMORY_OPENAI_API_KEY}
      - OPENAI_BASE_URL=${AGENTMEMORY_OPENAI_BASE_URL}
      - OPENAI_MODEL=${AGENTMEMORY_OPENAI_MODEL}
      - EMBEDDING_PROVIDER=local
      - AGENTMEMORY_SECRET=${AGENTMEMORY_SECRET}
      - AGENTMEMORY_AUTO_COMPRESS=false
      - AGENTMEMORY_INJECT_CONTEXT=true
      - CONSOLIDATION_ENABLED=true
      - CONSOLIDATION_INTERVAL_MS=86400000
      - GRAPH_EXTRACTION_ENABLED=false
      - AGENTMEMORY_SLOTS=true
      - AGENTMEMORY_REFLECT=true
      - AGENTMEMORY_TOOLS=core
      - AUTO_FORGET_ENABLED=true
      - LESSON_DECAY_ENABLED=true
      - INSIGHT_DECAY_ENABLED=true
      - AGENTMEMORY_VIEWER_HOST=0.0.0.0
      - VIEWER_ALLOWED_HOSTS=192.168.1.105:3113,memory.byetgin.com
      - VIEWER_ALLOWED_ORIGINS=http://192.168.1.105:3113,https://memory.byetgin.com
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3111/agentmemory/livez || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    ports:
      # Hermes requires its own authentication for non-loopback dashboard binds,
      # including access through the SNO-protected Nginx Proxy Manager host.
      - "192.168.1.105:9119:9119"
    volumes:
      - /fastpool/config/hermes:/opt/data
      - /fastpool/config:/fastpool/config
      - /datapool:/datapool
    environment:
      - HERMES_UID=1000
      - HERMES_GID=1000
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD}
      - HERMES_DASHBOARD_TUI=1
    command: ["gateway", "run"]
    networks:
      - ai-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 36 */6 * * *
      - WATCHTOWER_NOTIFICATION_URL=telegram://${WATCHTOWER_TELEGRAM_TOKEN:-}@telegram?chats=${WATCHTOWER_TELEGRAM_CHAT_IDS:-}
      - WATCHTOWER_NOTIFICATIONS_LEVEL=info
      - WATCHTOWER_NOTIFICATION_REPORT=true
      - 'WATCHTOWER_NOTIFICATION_TEMPLATE={{- if .Report -}}{{- with .Report -}}{{- if .Updated -}}{{len .Updated}} container updated:{{range .Updated}}{{"\n"}}- {{.Name}} ({{.ImageName}}): {{.CurrentImageID.ShortID}} -> {{.LatestImageID.ShortID}}{{end}}{{- end -}}{{- end -}}{{- end -}}'
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
      - WATCHTOWER_NOTIFICATION_TITLE_TAG=lxc-ai
    networks:
      - ai-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    stop_grace_period: 40s
    ports:
      - "20128:20128"
    volumes:
      - /fastpool/config/omniroute:/app/data
    environment:
      - NODE_ENV=production
      - PORT=20128
      - DATA_DIR=/app/data
      - REQUIRE_API_KEY=true
      - JWT_SECRET=${OMNI_JWT_SECRET}
      - API_KEY_SECRET=${OMNI_API_KEY_SECRET}
      - INITIAL_PASSWORD=${OMNI_INITIAL_PASSWORD}
    networks:
      - ai-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"
