# Proxmox Homelab Game Servers Stack
# Uses Docker Compose Profiles to manage resources efficiently.
# Common services (Promtail, cAdvisor) run always.
# Games run only when their specific profile is activated.

name: gaming

networks:
  gaming-net:
    driver: bridge


services:
  # ---------------------------------------------------------------------------
  # Palworld Server (Profile: palworld)
  # Start with: docker compose -p app -f docker-compose.yml --profile palworld up -d
  # ---------------------------------------------------------------------------
  palworld-server:
    image: thijsvanloef/palworld-server-docker:latest
    container_name: palworld-server
    profiles: ["palworld"]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/Istanbul}
      # --- Server Identity & Security ---
      - SERVER_NAME=${PALWORLD_SERVER_NAME}
      - SERVER_DESCRIPTION=${PALWORLD_SERVER_DESCRIPTION}
      - SERVER_PASSWORD=${PALWORLD_SERVER_PASSWORD}
      - ADMIN_PASSWORD=${PALWORLD_ADMIN_PASSWORD}
      - COMMUNITY_SERVER=${PALWORLD_COMMUNITY_SERVER:-false}
      - PUBLIC_IP=${PALWORLD_PUBLIC_IP}
      - PUBLIC_PORT=8211
      - MAX_PLAYERS=${PALWORLD_MAX_PLAYERS:-4}
      - USEAUTH=false
      - BAN_LIST_URL=https://b.palworldgame.com/api/banlist.txt
      
      # --- Performance & System ---
      - MULTITHREAD_ENABLED=true
      - UPDATE_ON_BOOT=true
      - RCON_ENABLED=false
      
      # --- REST API (Enabled for management) ---
      - REST_API_ENABLED=true
      - REST_API_PORT=8212

      # --- Backup Settings ---
      - BACKUP_ENABLED=true
      - BACKUP_CRON_EXPRESSION=0 */6 * * *
      - DELETE_OLD_BACKUPS=true
      - OLD_BACKUP_DAYS=7

      # --- Auto Reboot (Memory Leak Protection) ---
      - AUTO_REBOOT_ENABLED=true
      - AUTO_REBOOT_CRON_EXPRESSION=0 4 * * *

      # --- Palworld 1.0 Game Settings ---
      - DEATH_PENALTY=Item                    # Drops items only (Keeps equipment/Pals)
      - COLLECTION_DROP_RATE=1.0              # 1x Resources (Vanilla 1.0 default)
      - WORK_SPEED_RATE=1.0                   # Standard crafting speed (Vanilla 1.0 default)
      - PAL_EGG_DEFAULT_HATCHING_TIME=1.0     # 1 hour hatching time (Vanilla 1.0 default)
      - AUTO_PAUSE_ENABLED=false              # Custom: Keep running for AFK farming
      - ENABLE_NON_LOGIN_PENALTY=false        # Custom: No penalty for offline days
      - AUTO_SAVE_SPAN=300                    # Custom: Auto-save every 5 minutes (Performance)
      - BASE_CAMP_WORKER_MAX_NUM=20           # Custom: 20 base workers (Vanilla is 15, we set 20)
      
    volumes:
      - /root/palworld:/palworld
      - /datapool/config/gameservers/palworld/Saved:/palworld/Pal/Saved
      - /datapool/config/gameservers/palworld/backups:/palworld/backups
      - /datapool/config/gameservers/palworld/mods:/palworld/Pal/Content/Paks/~mods:ro
    ports:
      - "8211:8211/udp"  # Game port
      - "27015:27015/udp"  # Query port
      - "8212:8212/tcp"  # REST API
    networks:
      - gaming-net
    restart: unless-stopped
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD-SHELL", "netstat -an | grep -q ':8211'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  # ---------------------------------------------------------------------------
  # Satisfactory Server (Profile: satisfactory)
  # Start with: docker compose -p app -f docker-compose.yml --profile satisfactory up -d
  # ---------------------------------------------------------------------------
  satisfactory-server:
    image: indifferentbroccoli/satisfactory-server-docker:latest
    container_name: satisfactory-server
    profiles: ["satisfactory"]
    # Temporary workaround for FactoryServer.sh execution permissions (PR #13)
    # Can be removed once PR is merged: https://github.com/indifferentbroccoli/satisfactory-server-docker/pull/13
    entrypoint: ["/bin/bash", "-c", "(while [ ! -f /satisfactory/FactoryServer.sh ]; do sleep 1; done; chmod -R +x /satisfactory/FactoryServer.sh /satisfactory/Engine/Binaries/Linux/ /satisfactory/FactoryGame/Binaries/Linux/ 2>/dev/null) & exec /home/steam/server/init.sh"]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/Istanbul}
      - GENERATE_SETTINGS=true
      - MAX_PLAYERS=${SATISFACTORY_MAX_PLAYERS:-10}
      - UPDATE_ON_START=${SATISFACTORY_UPDATE_ON_START:-true}
      - BRANCH=${SATISFACTORY_BRANCH:-public}
      - RELIABLE_PORT=7778
    volumes:
      - /datapool/config/gameservers/satisfactory:/home/steam/.config/Epic/FactoryGame/Saved/SaveGames
      - /opt/satisfactory:/satisfactory
    ports:
      - "7777:7777/udp"  # Game port UDP
      - "7777:7777/tcp"  # Game port TCP
      - "7778:7778/tcp"  # Reliable messaging port (Required for indifferentbroccoli)
    networks:
      - gaming-net
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - WATCHTOWER_CLEANUP=true
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - WATCHTOWER_SCHEDULE=0 48 */6 * * *
      - WATCHTOWER_NOTIFICATION_URL=telegram://${WATCHTOWER_TELEGRAM_TOKEN:-}@telegram?chats=${WATCHTOWER_TELEGRAM_CHAT_IDS:-}
      - WATCHTOWER_NOTIFICATIONS_LEVEL=info
      - WATCHTOWER_NOTIFICATION_TITLE_TAG=lxc-gaming
    networks:
      - gaming-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
        labels: "com.docker.compose.service,com.docker.compose.project"