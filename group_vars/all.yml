---
# Common variables for all roles - loaded from stacks.yaml
# This file dynamically reads the central configuration

# Load stacks configuration
stacks_config: "{{ lookup('file', playbook_dir ~ '/stacks.yaml') | from_yaml }}"

# Extract global settings for easy access
network_gateway: "{{ stacks_config.network.gateway }}"
network_bridge: "{{ stacks_config.network.bridge }}"
network_ip_base: "{{ stacks_config.network.ip_base }}"
storage_pool: "{{ stacks_config.storage.pool }}"
datapool_mount: "{{ stacks_config.storage.mount_point }}"
proxmox_node: "{{ stacks_config.global.proxmox_node }}"
repo_url: "{{ stacks_config.global.repo_url }}"
repo_dir: "{{ stacks_config.global.repo_dir }}"

# API settings
proxmox_api_user: "{{ stacks_config.api.user }}"
proxmox_api_token_id: "{{ stacks_config.api.token_id }}"
proxmox_api_host: "{{ network_ip_base }}.1"

# Template settings
alpine_template_pattern: "{{ stacks_config.templates.alpine_latest }}"
debian_template_pattern: "{{ stacks_config.templates.debian_latest }}"
default_template_type: "{{ stacks_config.templates.default_template }}"
special_debian_stacks: "{{ stacks_config.templates.special_templates }}"
