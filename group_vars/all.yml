---
# Global variables for all roles - Best Practice Configuration Management
# This file provides centralized access to configuration from stacks.yaml

# Load central configuration once and cache it
homelab_config: "{{ lookup('file', playbook_dir ~ '/stacks.yaml') |
  from_yaml }}"

# ======================================================================
# GLOBAL SETTINGS - Available to all roles
# ======================================================================

# Proxmox Configuration
proxmox_node: "{{ homelab_config.global.proxmox_node }}"
proxmox_api_user: "{{ homelab_config.api.user }}"
proxmox_api_token_id: "{{ homelab_config.api.token_id }}"
proxmox_api_host: "{{ homelab_config.network.proxmox_host_ip }}"

# Network Configuration (Static for homelab)
network_gateway: "{{ homelab_config.network.gateway }}"
network_bridge: "{{ homelab_config.network.bridge }}"
network_ip_base: "{{ homelab_config.network.ip_base }}"

# Storage Configuration
storage_pool: "{{ homelab_config.storage.pool }}"
datapool_mount: "{{ homelab_config.storage.mount_point }}"

# Repository Settings
repo_url: "{{ homelab_config.global.repo_url }}"
repo_dir: "{{ homelab_config.global.repo_dir }}"
timezone: "{{ homelab_config.global.timezone }}"

# Template Management
lxc_template_patterns:
  alpine: "{{ homelab_config.templates.alpine_latest }}"
  debian: "{{ homelab_config.templates.debian_latest }}"

default_template_type: "{{ homelab_config.templates.default_template }}"
debian_required_stacks: "{{ homelab_config.templates.special_templates }}"

# ======================================================================
# ROLE CONFIGURATION HELPERS - For easy access in roles
# ======================================================================

# Function to get stack configuration by name
stacks_definitions: "{{ homelab_config.stacks }}"
