---
- name: Deploy a specific LXC stack with best practices
  hosts: localhost
  connection: local
  gather_facts: true
  vars_files:
    - secrets.yml

  pre_tasks:
    - name: Set default stack if not provided
      ansible.builtin.set_fact:
        stack_name: "{{ stack_name | default('proxy') }}"

    - name: Display deployment information
      ansible.builtin.debug:
        msg:
          - "Deploying stack: {{ stack_name }}"
          - "Timestamp: {{ now() }}"

    - name: Validate stack exists in configuration
      ansible.builtin.assert:
        that: stack_name in homelab_config.stacks.keys()
        fail_msg: "Stack '{{ stack_name }}' not found. Available: {{ homelab_config.stacks.keys() | list | join(', ') }}"

    - name: Load stack configuration
      ansible.builtin.set_fact:
        current_stack_config: "{{ homelab_config.stacks[stack_name] }}"

    - name: Set LXC template name for role dependencies
      ansible.builtin.set_fact:
        lxc_template_name: "{{ lxc_template | default('') }}"
      when: lxc_template is defined

  tasks:
    - name: Deploy the selected stack role
      ansible.builtin.include_role:
        name: "{{ stack_name }}"
      vars:
        # Pass current stack configuration to the role
        stack_config: "{{ current_stack_config }}"

  post_tasks:
    - name: Display deployment completion
      ansible.builtin.debug:
        msg:
          - "Stack '{{ stack_name }}' deployed successfully!"
          - "Container: {{ current_stack_config.ct_id }} ({{ current_stack_config.hostname }})"
          - "IP: {{ network_ip_base }}.{{ current_stack_config.ip_octet }}"
