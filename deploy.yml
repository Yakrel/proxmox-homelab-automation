---
- name: Deploy a specific LXC stack
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    - name: Check that stack_name is provided
      fail:
        msg: "Please provide the stack name to deploy, e.g., --extra-vars 'stack_name=proxy'"
      when: stack_name is not defined

  roles:
    - role: "{{ stack_name }}"
