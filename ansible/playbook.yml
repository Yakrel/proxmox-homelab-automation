---
- name: Setup all LXC containers
  hosts: lxc
  become: yes
  roles:
    - common

- name: Configure Proxy Stack
  hosts: proxy
  become: yes
  roles:
    - proxy
  tasks:
    - name: Copy docker-compose.yml for proxy
      copy:
        src: "../../../docker/proxy/docker-compose.yml"
        dest: "/root/proxy/docker-compose.yml"
        mode: '0644'
    - name: Start proxy services with docker-compose
      community.docker.docker_compose:
        project_src: "/root/proxy"
        state: present

