---
- name: Deploy Media Stack
  hosts: media
  tasks:
    - name: Create directories structure
      file:
        path: /root/media
        state: directory
        mode: '0755'

    - name: Copy docker-compose.yml file
      copy:
        src: ../docker/media/docker-compose.yml
        dest: /root/media/docker-compose.yml
        mode: '0644'

    - name: Deploy media stack
      shell: cd /root/media && docker-compose up -d
      args:
        chdir: /root/media

