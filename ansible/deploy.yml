---
- name: Deploy Media Stack
  hosts: media
  tasks:
    - name: Create directories structure
      file:
        path: /root/docker
        state: directory
        mode: '0755'

    - name: Copy docker-compose.yml file
      copy:
        src: ../docker/media/docker-compose.yml
        dest: /root/docker/docker-compose.yml
        mode: '0644'

    - name: Deploy media stack
      shell: cd /root/docker && docker-compose up -d
      args:
        chdir: /root/docker

