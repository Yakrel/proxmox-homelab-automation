---
# Common role tasks - Common configurations for all containers

- name: Check if SSH is installed
  shell: "which sshd || echo 'not-installed'"
  register: ssh_installed
  changed_when: false
  ignore_errors: yes

- name: Install SSH (if not installed)
  block:
    - name: Update package cache
      apk:
        update_cache: yes
      ignore_errors: yes
      
    - name: Install OpenSSH
      apk:
        name: openssh
        state: present
      
    - name: Create SSH directory
      file:
        path: /etc/ssh
        state: directory
        mode: '0755'
      
    - name: Configure SSH for root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin yes'
        create: yes

    - name: Configure SSH for password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'
        create: yes
      
    - name: Add SSH to startup
      command: rc-update add sshd
      ignore_errors: yes
      
    - name: Start SSH service
      service:
        name: sshd
        state: started
  when: ssh_installed.stdout == 'not-installed'

- name: Update package cache
  apk:
    update_cache: yes

- name: Install essential packages
  apk:
    name:
      - docker
      - docker-compose
      - python3
      - py3-pip
      - curl
      - wget
      - nano
      - bash
    state: present

- name: Start and enable Docker service
  service:
    name: docker
    state: started
    enabled: yes

- name: Create Docker user group
  group:
    name: docker
    state: present

- name: Add root to Docker group
  user:
    name: root
    groups: docker
    append: yes

- name: Set timezone to Europe/Istanbul
  timezone:
    name: Europe/Istanbul

# Autologin configuration for Proxmox console
- name: Configure autologin for Proxmox console
  block:
    - name: Check if inittab exists
      stat:
        path: /etc/inittab
      register: inittab_file

    - name: Configure autologin for tty1 (Alpine)
      lineinfile:
        path: /etc/inittab
        regexp: '^tty1'
        line: 'tty1::respawn:/bin/login -f root'
        state: present
      when: inittab_file.stat.exists

    # Remove root password in shadow file
    - name: Remove root password (for autologin)
      user:
        name: root
        password: ''

# SSH security (after Ansible connection is completed)
- name: Configure SSH for security
  block:
    - name: Ensure .ssh directory exists
      file:
        path: /root/.ssh
        state: directory
        mode: '0700'

    - name: Set authorized key for root user from management container
      authorized_key:
        user: root
        state: present
        key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present

    - name: Allow only internal network SSH access
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ListenAddress'
        line: 'ListenAddress 192.168.1.0/24'
        state: present
        insertafter: '^#ListenAddress'

    - name: Restart sshd service
      service:
        name: sshd
        state: restarted
