---
# Common service setup tasks
- name: Create service directory
  file:
    path: "/root/{{ service_name }}"
    state: directory
    mode: '0755'

- name: Copy docker-compose.yml for service
  copy:
    src: "{{ playbook_dir }}/../docker/{{ service_name }}/docker-compose.yml"
    dest: "/root/{{ service_name }}/docker-compose.yml"
    mode: '0644'
  when: docker_compose is not defined or docker_compose

- name: Start services with docker-compose
  community.docker.docker_compose:
    project_src: "/root/{{ service_name }}"
    state: present
  when: docker_compose is not defined or docker_compose
